services:
  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=influx
    volumes:
      - influxdb-data:/var/lib/influxdb
    healthcheck:
      test: [ "CMD-SHELL", "curl -f 'http://localhost:8086/query?q=show+databases' | grep influx || exit 1" ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  grafana:
    image: grafana/grafana:8.5.27
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy

  tank:
    image: yandex/yandex-tank
    container_name: yandex-tank
    volumes:
      - .:/var/loadtest
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb-data:
  grafana-data: